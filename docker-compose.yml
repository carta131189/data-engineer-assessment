services:

  postgres:
    image: postgres:16
    container_name: postgres_data_jobs

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:

    build: .

    container_name: data_engineer_app

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    volumes:
      - .:/app

    working_dir: /app

    command: tail -f /dev/null

volumes:
  postgres_data: